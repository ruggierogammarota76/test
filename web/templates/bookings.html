<!doctype html>
<html>
  <head>
    <title>Prenotazioni</title>
  </head>
  <body>
    <h1>Prenotazioni</h1>
    <p>Benvenuto, {{ current_user.username }} (<a href="{{ url_for('logout') }}">logout</a>)</p>
    <h2>Nuova prenotazione</h2>
    <form method="post" action="{{ url_for('book') }}">
      <label>Title: <input name="title"></label><br>
      <label>Start: <input name="start" placeholder="YYYY-MM-DD HH:MM"></label><br>
      <label>End: <input name="end" placeholder="YYYY-MM-DD HH:MM"></label><br>
      <button type="submit">Prenota</button>
    </form>

    <h2>Lista prenotazioni</h2>
    <ul>
      {% for b in bookings %}
        <li>{{ b.title }} — {{ b.start_time }} to {{ b.end_time }} (by {{ b.user_id }})</li>
      {% else %}
        <li>Non ci sono prenotazioni.</li>
      {% endfor %}
    </ul>
  </body>
</html>
